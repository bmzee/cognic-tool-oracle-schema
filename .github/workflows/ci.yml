# PR-side CI for cognic-tool-oracle-schema.
#
# Three lanes:
#   - lint-type-unit     ruff lint + mypy + the unit suite (no DB)
#   - authoring-validate the @v0.0.2 `agentos validate` build-time manifest-shape
#                         check (placeholder attestations seeded on the runner;
#                         real cosign/SBOM bundle + `agentos verify` are release)
#   - oracle-integration env-gated live Oracle XE lane (mirrors the kernel's)
#
# Signing/publishing (`agentos sign --bundle` + `agentos verify`) is RELEASE
# work — it shells out to cosign / syft / grype / pip-licenses — and lives in
# .github/workflows/sign-and-publish.yml, not here.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-type-unit:
    name: lint + type + unit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # uv.lock is intentionally gitignored in this repo (the pyproject pins are
      # the source of truth), so sync resolves at CI time — NOT `--frozen`.
      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Type-check
        run: uv run mypy src tests

      - name: Unit tests (integration self-skips without COGNIC_RUN_ORACLE_INTEGRATION)
        run: uv run pytest tests/ -q

  authoring-validate:
    name: authoring (agentos validate)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      # The `dev` extra git-pins `cognic-agentos @ ...@v0.0.2`, which provides
      # the `agentos` authoring/governance CLI used for the build-time check.
      - name: Sync dev dependencies (installs the @v0.0.2 authoring CLI)
        run: uv sync --extra dev

      # `agentos validate` checks the manifest against the build-time trust gate,
      # which includes that each declared [supply_chain].attestation_paths file
      # exists + is non-empty (no unfilled template markers). The REAL bundle
      # (cosign sig + CycloneDX SBOM) is produced by `agentos sign --bundle .` at release
      # (Task 9); it shells out to cosign / syft / grype / pip-licenses, which
      # are absent from this PR lane. So here we seed throwaway placeholders —
      # this makes the lane a manifest-SHAPE check, NOT a signature/SBOM-content
      # check (that is `agentos verify` at release). The placeholders are created
      # on the runner only and are never committed.
      - name: Seed placeholder attestations (manifest-shape check only)
        run: |
          mkdir -p attestations
          printf 'ci-placeholder: cosign signature generated by `agentos sign --bundle` at release\n' > attestations/cosign.sig
          printf '{"bomFormat":"CycloneDX","specVersion":"1.5","version":1}\n' > attestations/sbom.cdx.json

      - name: agentos validate (build-time manifest-shape check)
        run: uv run agentos validate .

      # NOTE: `agentos sign --bundle` + `agentos verify` run at RELEASE (they
      # shell out to cosign / syft / grype / pip-licenses, absent from this CI).
      # See .github/workflows/sign-and-publish.yml + plan Task 9 — out of scope
      # for this PR-side lane.

  oracle-integration:
    # Env-gated live-DB lane (mirrors the kernel's oracle-integration lane): the
    # @pytest.mark.oracle tests self-skip via
    # skipif(COGNIC_RUN_ORACLE_INTEGRATION != "1"). This job is the only place
    # that env is set, so it is the only place those tests execute. Oracle XE
    # first-boot is slow (~3-5 min), hence the generous timeout.
    name: oracle integration (live XE)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv + Python 3.12
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dev dependencies
        run: uv sync --extra dev

      - name: Bring up Oracle XE (wait for healthy)
        run: docker compose -f docker-compose.oracle.yml up -d --wait

      - name: Run @pytest.mark.oracle integration tests
        env:
          COGNIC_RUN_ORACLE_INTEGRATION: "1"
          COGNIC_ORACLE_DSN: localhost:1521/XEPDB1
          COGNIC_ORACLE_USER: cognic
          COGNIC_ORACLE_PASSWORD: cognic_dev_only
        run: uv run pytest tests/integration -m oracle -q

      - name: Tear down Oracle XE
        if: always()
        run: docker compose -f docker-compose.oracle.yml down -v
