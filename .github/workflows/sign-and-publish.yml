# Release signing workflow — runs `agentos validate` + `agentos sign --bundle`
# + `agentos verify` to produce the signed attestation bundle. The publishing
# (distribution) step is intentionally deferred until the Task 9 / release cut;
# the sign + verify proof is recorded in docs/VALIDATION-RESULTS.md at release.

name: sign-and-publish

# Manual / release-gated: signing is Task 9 / operator work and needs the
# supply-chain toolchain (cosign / syft / grype / pip-licenses) provisioned on
# the runner first. Do NOT make this push-triggered until that hardening lands.
on:
  workflow_dispatch:

jobs:
  sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # cosign keyless signing via OIDC
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install "cognic-agentos @ git+https://github.com/bmzee/cognic-agentos@v0.0.2"
      - run: agentos validate .
      - run: agentos sign --bundle .
      - run: agentos verify .
      # Publishing step intentionally deferred until the Task 9 / release cut
      # (the distribution target — internal registry / OCI / PyPI — is decided then).
