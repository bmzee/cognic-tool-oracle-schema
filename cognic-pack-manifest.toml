# Cognic AgentOS pack manifest — Wave-1 schema.
#
# Run `agentos validate .` to check this manifest against the kernel's
# build-time trust gate.

[pack]
pack_id = "cognic-tool-oracle-schema"
schema_version = 1
kind = "tool"

[identity]
# AGNTCY/OASF identity matrix. Tool packs declare the universally
# mandatory Wave-1 fields below (cli/validators/identity.py). The
# agent-card fields (agent_card_url + agent_card_jws_path) are
# agent-pack-only and are intentionally omitted for a tool pack.
agent_id = "did:web:github.com:bmzee:cognic-tool-oracle-schema"
display_name = "Cognic Oracle Schema"
provider_organization = "Cognic"
provider_url = "https://github.com/bmzee/cognic-tool-oracle-schema"

# OASF capability set — optional Wave-1 (warning, NOT refusal):
# capability_set = ["kyc.v1", "retrieval.v1"]

[mcp]
# Wave-1 MCP capabilities. Caching + elicitation_form on restricted
# data classes trip refusals from the MCP validator (T9).
caching = false
elicitation_form = false

[data_governance]
# ADR-017 contract. Every field below is enforced by the
# data-governance validator (T10) + the runtime DLP path. Vocabulary
# values are closed-enum literals defined at
# cognic_agentos.cli._governance_vocab; see the validator for the full
# allowed-values list.
data_classes = ["internal"]
purpose = "operational_telemetry"
retention_policy = "none"
# retention_max_window required when retention_policy != "none".
# Positive number representing the retention period (units per
# pack-author docs, typically days).
# retention_max_window = 90  # uncomment + set when retention_policy != "none"
egress_allow_list = []  # empty: the pack makes no outbound HTTP calls (the Oracle connection is deployment config, not egress)

[risk_tier]
# ADR-014 risk tier. Must be consistent with the declared
# data_classes (e.g., declaring 'customer_pii' requires at least
# 'customer_data_read'; declaring 'payment_data' requires at least
# 'payment_action'). Closed-enum vocabulary defined at
# cognic_agentos.cli._governance_vocab.RiskTier.
tier = "read_only"

[supply_chain]
# ADR-016 attestation paths. Each path is checked at validate time;
# missing files trip supply_chain_attestation_path_unresolvable.
# Run `agentos sign --bundle .` to populate attestations/.
attestation_paths = [
    "attestations/cosign.sig",
    "attestations/sbom.cdx.json",
]

[tool.cognic.mcp]
# Runtime-consumed block (harness/mcp_host.py + protocol/mcp_capabilities.py).
# The key is `scopes`, NOT `required_scopes`.
transport = "streamable-http"
auth = "oauth-prm"
server_url = "http://127.0.0.1:8765/mcp"
scopes = ["oracle_schema.read"]
resources_supported = false
prompts_supported = false
sampling_supported = false
conformance_version = "1.0"
